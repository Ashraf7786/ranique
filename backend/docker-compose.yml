version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ranique-postgres
    environment:
      POSTGRES_USER: ranique_user
      POSTGRES_PASSWORD: ranique_password
      POSTGRES_DB: ranique_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ranique_user -d ranique_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ranique-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  postgres-data:
  redis-data:
